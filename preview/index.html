<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparklink Logo - Final</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 60px 20px; }
h1 { font-size: 24px; font-weight: 700; }
h1 span { background: linear-gradient(135deg,#7C3AED,#06B6D4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { color: #666; font-size: 13px; margin: 6px 0 40px; }
.grid { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
.card { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.card-title { font-size: 13px; font-weight: 600; color: #aaa; letter-spacing: 1px; }
.card-desc { font-size: 11px; color: #555; }
.icon { width: 160px; height: 160px; border-radius: 32px; position: relative; overflow: hidden; box-shadow: 0 16px 48px rgba(0,0,0,0.5); }
.icon svg { display: block; width: 100%; height: 100%; }
.icon::after { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity: 0.06; mix-blend-mode: overlay; pointer-events: none; }
</style>
</head>
<body>

<h1>Sparklink · <span>Logo Final</span></h1>
<p class="subtitle">白色箭头 · 紫→青渐变圆角矩形 · scale 0.12</p>

  <div class="card">
    <div class="icon" style="background:#16162a;">

        <defs>

            <stop offset="0%" stop-color="#7C3AED"/>
            <stop offset="100%" stop-color="#06B6D4"/>
          </linearGradient>
        </defs>
        <rect x="14" y="14" width="92" height="92" rx="20" fill="url(#g)"/>
        <path fill="white" transform="translate(-1.44,-1.44) scale(0.12)" d="M 620.1 555.9 A 4 4 0 0 1 616 551.9 L 616 487.9 A 4 4 0 0 1 619.8 483.9 A 68 68 0 1 0 548 416 L 548 608 A 140 140 0 0 1 408 748 C 330.8 748 268 685.2 268 608 S 328.5 470.2 403.9 468.1 A 4 4 0 0 1 408 472.1 L 408 536.1 A 4 4 0 0 1 404.2 540.1 A 68 68 0 1 0 476 608 L 476 416 A 140 140 0 0 1 616 276 C 693.2 276 756 338.8 756 416 S 695.5 553.8 620.1 555.9 Z"/>
      </svg>
    </div>
    <span class="card-title">Sparklink Logo</span>
    <span class="card-desc">assets/logo.svg</span>
  </div>
</div>
</body>
</html>
